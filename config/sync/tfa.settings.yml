_core:
  default_config_hash: JyIkFj38h-aTLsrCfejAfP277qBJ61tlaLEBH44IHhg
langcode: es
enabled: true
required_roles:
  administrator: administrator
  manager: manager
  physiotherapist: physiotherapist
  authenticated: '0'
  patient: '0'
send_plugins: {  }
login_plugins: {  }
login_plugin_settings:
  tfa_trusted_browser:
    cookie_allow_subdomains: true
    cookie_expiration: 30
    cookie_name: tfa-trusted-browser
allowed_validation_plugins:
  tfa_totp: tfa_totp
default_validation_plugin: tfa_totp
validation_plugin_settings:
  tfa_recovery_code:
    recovery_codes_amount: 10
  tfa_hotp:
    counter_window: 10
    site_name_prefix: 1
    name_prefix: TFA
    issuer: Drupal
  tfa_totp:
    time_skew: 2
    site_name_prefix: 1
    name_prefix: TFA
    issuer: CITIUS
