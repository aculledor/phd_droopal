tfa_flood_uid_only: 1
tfa_flood_window: 300
tfa_flood_threshold: 6
help_text: 'Comuníquese con el soporte para restablecer su acceso'
mail:
  tfa_enabled_configuration:
    subject: 'Su cuenta [site:name] ahora tiene autenticación de dos factores'
    body: "[user:display-name],\r\n\r\n¡Gracias por configurar la autenticación de dos factores en tu cuenta de [site:name]!\r\n\r\nEste nivel adicional de seguridad te ayudará a garantizar que solo tú puedas iniciar sesión en tu cuenta.\r\n\r\nSi alguna vez pierdes el dispositivo que configuraste, debes actuar rápidamente para eliminar su asociación con esta cuenta.\r\n\r\n--\r\nEquipo de [site:name]"
  tfa_disabled_configuration:
    subject: 'Su cuenta [site:name] ya no tiene autenticación de dos factores'
    body: "[user:display-name],\r\n\r\nSe ha desactivado la autenticación de dos factores en su cuenta [site:name].\r\n\r\nSi no ha realizado esta acción, póngase en contacto con un administrador del sitio inmediatamente.\r\n\r\n--\r\nEquipo de [site:name]"
