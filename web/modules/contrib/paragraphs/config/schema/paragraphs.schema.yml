paragraphs.settings:
  type: config_object
  mapping:
    show_unpublished:
      type: boolean
      label: 'Allow users with "View unpublished paragraphs" permission to see unpublished paragraphs.'
    individual_behavior_buttons:
      type: boolean
      label: 'Show individual behavior buttons for each paragraph type. Disable this if you want to use the global behavior buttons for all paragraph types.'
