id: provinces
label: 'Provinces import'
migration_tags:
  - 'taxonomy'
source:
  plugin: csv
  path: 'modules/custom/spanish_municipalities_provider/data/municipalities.csv'
  header_offset: 0
  ids: [province_code]
  skip_count: true
  constants:
    vid: administrative_division
process:
  vid:
    plugin: default_value
    default_value: administrative_division
  name: province_name
  field_official_code: province_code
  parent:
    -
      plugin: migration_lookup
      migration: autonomies
      source: autonomy_code
    -
      plugin: skip_on_empty
      method: process
  status:
    plugin: default_value
    default_value: 1
destination:
  plugin: entity:taxonomy_term
migration_dependencies:
  required:
    - autonomies
