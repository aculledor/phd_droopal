$schema: https://git.drupalcode.org/project/drupal/-/raw/HEAD/core/assets/schemas/v1/metadata-full.schema.json
name: Page Pre Footer
status: experimental
description: 'Component for the page pre-footer.'
props:
  type: object
  properties:
    attributes:
      type: Drupal\Core\Template\Attribute
      description: 'HTML attributes for the footer component.'
    footer_attributes:
      type: Drupal\Core\Template\Attribute
      description: 'HTML attributes specifically for the footer.'
    footer_utility_classes:
      type: array
      items:
        type: string
      description: 'Additional utility classes to add to the footer.'
slots:
  page_inner_prefooter:
    title: Page Inner Pre Footer
    description: 'The main contents of the pre footer.'
